<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Example DevTools Network screenshot for HTTP 421 with highlighted Status, Protocol, Connection ID, and Remote Address columns">
