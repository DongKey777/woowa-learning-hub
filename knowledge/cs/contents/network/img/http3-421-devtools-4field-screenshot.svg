      .pill { fill: #0b1220; stroke: #475569; stroke-width: 1; rx: 8; ry: 8; }
      .pilltxt { fill: #e5e7eb; font-size: 13px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .num { fill: #0f172a; font-size: 12px; font-weight: 800; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
