  <rect class="pill" x="72" y="358" width="1136" height="272"/>
  <text class="txt" x="90" y="390">How to read this capture in 30 seconds</text>
  <text class="small" x="90" y="420">1) Status: first row should show 421, second row can be 200/403/404.</text>
  <text class="small" x="90" y="446">2) Protocol: retry can stay h3 or switch to h2. Protocol change is optional.</text>
  <text class="small" x="90" y="472">3) Connection ID: key proof. IDs should differ between row 1 and row 2.</text>
  <text class="small" x="90" y="498">4) Remote Address: supporting proof. Change helps, but same address does not disprove retry.</text>
  <text class="pilltxt" x="90" y="538">Tip for beginners: read rows by time order, not grouped status.</text>
  <text class="pilltxt" x="90" y="564">This is an illustrative capture, not a vendor-specific UI contract.</text>

  <text class="txt" x="40" y="712">qa-content-network-00019 - illustrative screenshot for Beginner 421 proof checklist</text>
